<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - {{ empresa_nome }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">{{ empresa_nome }}</div>
      <div class="login-subtitle">Controle de Visitantes</div>

      <div id="alertaLogin"></div>

      <form id="formLogin" novalidate>
        <div class="form-group full" style="margin-bottom: 16px;">
          <label for="login"><i class="fa-solid fa-user"></i> Usuário</label>
          <input type="text" id="login" name="login" placeholder="Digite seu login" required autofocus>
        </div>

        <div class="form-group full" style="margin-bottom: 22px;">
          <label for="senha"><i class="fa-solid fa-lock"></i> Senha</label>
          <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn btn-primary" id="btnLogin" style="width: 100%; justify-content: center;">
          <i class="fa-solid fa-right-to-bracket"></i> Entrar
        </button>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      AppVisitantes.inicializarPaginaLogin();
    });
  </script>
</body>
</html>
